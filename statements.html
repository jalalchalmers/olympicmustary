<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>BizFlow — স্টেটমেন্ট</title>
  <style>
    .st-controls{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:16px}
    .st-controls .field{display:flex;flex-direction:column;gap:4px}
    .st-controls label{font-size:12px;font-weight:600;color:var(--ink2)}
    .st-controls select,.st-controls input{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:13px;background:#fff;color:var(--ink)}
    .st-table{width:100%;border-collapse:collapse}
    .st-table th,.st-table td{padding:7px 10px;border-bottom:1px solid var(--border);font-size:13px}
    .st-table th{text-align:left;background:var(--bg);font-weight:700;font-size:12px}
    .st-table td.r,.st-table th.r{text-align:right}
    .st-foot td{font-weight:700;background:#f8fafc;border-top:2px solid var(--border)}
    .vf-hide{display:none!important}
    .bal-pos{color:var(--success)}.bal-neg{color:var(--danger)}
    @media print{
      .bf-nav,.bf-topbar,.no-print{display:none!important}.bf-main{margin-left:0}.bf-body{padding:0}
      .st-table{font-size:11px}.st-table th,.st-table td{border:1px solid #475569!important;padding:3px 6px!important}
      .st-table th{background:#e2e8f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      @page{size:landscape;margin:8mm}
    }
  </style>
</head>
<body>
<div class="bf-layout">
  <nav class="bf-nav" id="bf-nav"></nav>
  <div class="bf-main">

    <div class="bf-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="bf-menu-btn" id="bf-menu-btn">☰</button>
        <span class="bf-page-title">স্টেটমেন্ট</span>
      </div>
      <div class="bf-topbar-right">
        <button class="btn btn-outline btn-sm no-print" id="btn-print">🖨️ প্রিন্ট</button>
        <button class="btn btn-outline btn-sm no-print" id="btn-csv">⬇ CSV</button>
      </div>
    </div>

    <div class="bf-body">

      <div class="card no-print" style="padding:16px 20px">
        <div class="st-controls">
          <div class="field">
            <label>স্টেটমেন্ট ধরন</label>
            <select id="st-view">
              <option value="supplier-own">সরবরাহকারী — শুধু ডিস্ট্রিবিউটর</option>
              <option value="supplier-all">সরবরাহকারী — সম্পূর্ণ (সব গ্রাহকসহ)</option>
              <option value="middleman">ডিস্ট্রিবিউটর↔সরবরাহকারী — এক গ্রাহকের জন্য</option>
              <option value="customer-full">গ্রাহক — সম্পূর্ণ (ভেরিফিকেশন)</option>
              <option value="customer-supplier">গ্রাহক↔সরবরাহকারী (সরাসরি)</option>
              <option value="all-customers">সকল গ্রাহক — বিস্তারিত</option>
              <option value="all-customers-summary">সকল গ্রাহক — সারাংশ</option>
              <option value="monthly-sales">মাসিক মোট বিক্রয় (কমিশনের ভিত্তি)</option>
            </select>
          </div>
          <div class="field vf-hide" id="wrap-sup">
            <label>সরবরাহকারী</label>
            <select id="st-supplier"></select>
          </div>
          <div class="field vf-hide" id="wrap-cust">
            <label>গ্রাহক</label>
            <select id="st-customer"></select>
          </div>
          <div class="field">
            <label>শুরুর তারিখ</label>
            <input type="date" id="st-from"/>
          </div>
          <div class="field">
            <label>শেষ তারিখ</label>
            <input type="date" id="st-to"/>
          </div>
          <button class="btn btn-primary btn-sm" id="btn-run">দেখুন</button>
        </div>
      </div>

      <div class="card" style="padding:0;overflow:hidden;margin-top:16px">
        <div id="st-title" style="padding:14px 20px;border-bottom:1px solid var(--border);font-weight:700"></div>
        <div class="table-wrap" style="overflow:auto">
          <div id="st-content" style="padding:20px;color:var(--ink3)">উপরে ধরন বেছে নিয়ে "দেখুন" চাপুন।</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="shared.js"></script>
<script src="layout.js"></script>
<script>
buildNav('statements');

let parties = JSON.parse(localStorage.getItem('bf_parties')||'[]');
let lastResult = null;

const VIEW_NEEDS = {
  'supplier-own':      ['sup'],
  'supplier-all':      ['sup'],
  'middleman':         ['cust'],
  'customer-full':     ['cust'],
  'customer-supplier': ['sup','cust'],
  'all-customers':     [],
  'all-customers-summary': [],
  'monthly-sales':     [],
};
const VIEW_TITLE = {
  'supplier-own':'সরবরাহকারী স্টেটমেন্ট (শুধু ডিস্ট্রিবিউটর)',
  'supplier-all':'সরবরাহকারী সম্পূর্ণ হিসাব',
  'middleman':'ডিস্ট্রিবিউটর ↔ সরবরাহকারী (গ্রাহকের জন্য)',
  'customer-full':'গ্রাহক স্টেটমেন্ট (ভেরিফিকেশন)',
  'customer-supplier':'গ্রাহক ↔ সরবরাহকারী (সরাসরি)',
  'all-customers':'সকল গ্রাহক — বিস্তারিত',
  'all-customers-summary':'সকল গ্রাহক — সারাংশ',
  'monthly-sales':'মাসিক মোট বিক্রয়',
};

function fillParties(){
  const sup=parties.filter(p=>p.type==='supplier'||p.type==='both');
  const cust=parties.filter(p=>p.type==='customer'||p.type==='both');
  const opt=p=>`<option value="${p.name}">${p.name}</option>`;
  document.getElementById('st-supplier').innerHTML=sup.map(opt).join('')||'<option value="">—</option>';
  document.getElementById('st-customer').innerHTML=cust.map(opt).join('')||'<option value="">—</option>';
}

function applyView(){
  const v=document.getElementById('st-view').value;
  const needs=VIEW_NEEDS[v]||[];
  document.getElementById('wrap-sup').classList.toggle('vf-hide',!needs.includes('sup'));
  document.getElementById('wrap-cust').classList.toggle('vf-hide',!needs.includes('cust'));
}

async function run(){
  const v=document.getElementById('st-view').value;
  const params={
    view:v,
    party:document.getElementById('st-supplier').value,
    refCustomer:document.getElementById('st-customer').value,
    from:document.getElementById('st-from').value,
    to:document.getElementById('st-to').value,
  };
  document.getElementById('st-title').textContent=VIEW_TITLE[v];
  const content=document.getElementById('st-content');
  if(!BF.sheetUrl){ content.innerHTML='Sheet সংযোগ নেই।'; return; }
  content.innerHTML='লোড হচ্ছে…';
  try{
    const r=await API.fetch('getStatement',{params});
    lastResult=r;
    render(v,r);
  }catch(e){ content.innerHTML='লোড ব্যর্থ।'; }
}

function balCls(n){ return n<0?'bal-neg':n>0?'bal-pos':''; }

function render(view,r){
  const content=document.getElementById('st-content');
  if(view==='all-customers-summary'){
    if(!r.summary||!r.summary.length){ content.innerHTML='<p style="color:var(--ink3)">কোনো তথ্য নেই।</p>'; return; }
    content.innerHTML=`<table class="st-table"><thead><tr>
      <th>গ্রাহক</th><th class="r">ইনভয়েস</th><th class="r">আদায়</th><th class="r">ব্যালেন্স</th></tr></thead><tbody>
      ${r.summary.map(c=>`<tr><td>${c.customer}</td><td class="r">${fmt.currency(c.invoiced)}</td>
        <td class="r">${fmt.currency(c.received)}</td>
        <td class="r ${balCls(c.balance)}">${fmt.currency(c.balance)}</td></tr>`).join('')}
      <tr class="st-foot"><td>মোট</td><td class="r">${fmt.currency(r.totals.invoiced)}</td>
        <td class="r">${fmt.currency(r.totals.received)}</td>
        <td class="r ${balCls(r.totals.balance)}">${fmt.currency(r.totals.balance)}</td></tr>
      </tbody></table>`;
    return;
  }
  if(view==='monthly-sales'){
    if(!r.months||!r.months.length){ content.innerHTML='<p style="color:var(--ink3)">কোনো বিক্রয় নেই।</p>'; return; }
    content.innerHTML=`<table class="st-table"><thead><tr><th>মাস</th><th class="r">মোট বিক্রয়</th></tr></thead><tbody>
      ${r.months.map(m=>`<tr><td>${m.month}</td><td class="r">${fmt.currency(m.sales)}</td></tr>`).join('')}
      </tbody></table>`;
    return;
  }
  // ledger-style views
  if(!r.rows||!r.rows.length){ content.innerHTML='<p style="color:var(--ink3)">এই সময়ে কোনো লেনদেন নেই।</p>'; return; }
  content.innerHTML=`<table class="st-table"><thead><tr>
    <th>তারিখ</th><th>বিবরণ</th><th class="r">পরিমাণ</th><th class="r">ব্যালেন্স</th></tr></thead><tbody>
    ${r.rows.map(x=>`<tr>
      <td>${x.date}</td><td>${x.desc}</td>
      <td class="r ${balCls(x.amount)}">${fmt.currency(x.amount)}</td>
      <td class="r ${balCls(x.running)}">${fmt.currency(x.running)}</td></tr>`).join('')}
    <tr class="st-foot"><td colspan="3">বর্তমান ব্যালেন্স</td>
      <td class="r ${balCls(r.balance)}">${fmt.currency(r.balance)}</td></tr>
    </tbody></table>
    <p style="font-size:12px;color:var(--ink3);padding:10px 4px">
      ধনাত্মক (+) = ডিস্ট্রিবিউটরের পাওনা / ঋণাত্মক (−) = ডিস্ট্রিবিউটরকে দিতে হবে।</p>`;
}

function exportCSV(){
  if(!lastResult){ toast('আগে স্টেটমেন্ট দেখুন','error'); return; }
  let csv='';
  if(lastResult.rows){
    csv='তারিখ,বিবরণ,পরিমাণ,ব্যালেন্স\n'+lastResult.rows.map(x=>`"${x.date}","${x.desc}",${x.amount},${x.running}`).join('\n');
  } else if(lastResult.summary){
    csv='গ্রাহক,ইনভয়েস,আদায়,ব্যালেন্স\n'+lastResult.summary.map(c=>`"${c.customer}",${c.invoiced},${c.received},${c.balance}`).join('\n');
  } else if(lastResult.months){
    csv='মাস,মোট বিক্রয়\n'+lastResult.months.map(m=>`${m.month},${m.sales}`).join('\n');
  }
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent('\uFEFF'+csv);
  a.download='statement_'+fmt.dateInput()+'.csv'; a.click();
}

document.getElementById('st-view').addEventListener('change',applyView);
document.getElementById('btn-run').addEventListener('click',run);
document.getElementById('btn-print').addEventListener('click',()=>window.print());
document.getElementById('btn-csv').addEventListener('click',exportCSV);

/* init */
fillParties();
applyView();
if(BF.sheetUrl){
  API.fetch('getParties').then(pts=>{ if(Array.isArray(pts)&&pts.length){ parties=pts; localStorage.setItem('bf_parties',JSON.stringify(pts)); fillParties(); } }).catch(()=>{});
}
</script>
</body>
</html>
