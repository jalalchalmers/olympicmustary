<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>hFlow — নগদ প্রবাহ</title>
  <style>
    .cf-cat{font-size:11px;padding:2px 9px;border-radius:10px;font-weight:600;white-space:nowrap}
    .cf-cat.inc{background:#dcfce7;color:#166534}
    .cf-cat.exp{background:#fee2e2;color:#991b1b}
    .cf-type-badge{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:600}
    .cf-type-badge.inc{background:#dcfce7;color:#166534}
    .cf-type-badge.exp{background:#fee2e2;color:#991b1b}
    table.cf-cat-table{width:100%;border-collapse:collapse;font-size:13px}
    table.cf-cat-table td,table.cf-cat-table th{padding:8px 12px;border-bottom:1px solid var(--border)}
    table.cf-cat-table td:last-child{text-align:right;font-weight:600}
    .cf-modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:300;align-items:center;justify-content:center;padding:16px}
    .cf-modal-overlay.open{display:flex}
    .cf-type-toggle{display:flex;gap:10px;margin-bottom:14px}
    .cf-type-toggle button{flex:1;padding:11px;border:2px solid var(--border);border-radius:11px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:var(--ink2)}
    .cf-type-toggle button.sel-inc{border-color:#16a34a;background:#dcfce7;color:#166534}
    .cf-type-toggle button.sel-exp{border-color:#dc2626;background:#fee2e2;color:#991b1b}
  </style>
</head>
<body>
<div class="bf-layout">
  <nav class="bf-nav" id="bf-nav"></nav>
  <div class="bf-main">

    <div class="bf-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="bf-menu-btn" id="bf-menu-btn">☰</button>
        <span class="bf-page-title">নগদ প্রবাহ</span>
      </div>
      <div class="bf-topbar-right">
        <button class="btn btn-outline btn-sm" id="btn-export">⬇ Export CSV</button>
        <button class="btn btn-primary btn-sm" id="btn-new">+ নতুন এন্ট্রি</button>
      </div>
    </div>

    <div class="bf-body">

      <!-- MONTHLY SUMMARY: income / expense / net (this month) -->
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-label">এই মাসের আয়</div><div class="stat-value" id="s-income" style="font-size:18px;color:var(--success)">৳0</div></div>
        <div class="stat-card"><div class="stat-icon">📉</div><div class="stat-label">এই মাসের ব্যয়</div><div class="stat-value" id="s-expense" style="font-size:18px;color:var(--danger)">৳0</div></div>
        <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-label">নিট (আয় − ব্যয়)</div><div class="stat-value" id="s-net" style="font-size:18px">৳0</div></div>
      </div>

      <!-- last month comparison strip -->
      <div class="card" style="padding:10px 20px;display:flex;gap:24px;flex-wrap:wrap;font-size:13px;color:var(--ink2)">
        <span>গত মাস — আয়: <strong id="lm-income" style="color:var(--success)">৳0</strong></span>
        <span>ব্যয়: <strong id="lm-expense" style="color:var(--danger)">৳0</strong></span>
        <span>নিট: <strong id="lm-net">৳0</strong></span>
      </div>

      <!-- FILTERS -->
      <div class="card" style="padding:14px 20px">
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:12px;color:var(--ink2);font-weight:600">শুরুর তারিখ</label>
            <input type="date" id="f-from" style="border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px"/>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:12px;color:var(--ink2);font-weight:600">শেষ তারিখ</label>
            <input type="date" id="f-to" style="border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px"/>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:12px;color:var(--ink2);font-weight:600">ধরন</label>
            <select id="f-flow" style="border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;background:#fff">
              <option value="">আয় + ব্যয়</option>
              <option value="income">শুধু আয়</option>
              <option value="expense">শুধু ব্যয়</option>
            </select>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <label style="font-size:12px;color:var(--ink2);font-weight:600">ক্যাটাগরি</label>
            <select id="f-category" style="border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;background:#fff;min-width:150px">
              <option value="">সব ক্যাটাগরি</option>
            </select>
          </div>
          <button class="btn btn-outline btn-sm" id="btn-clear">সব দেখুন</button>
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;padding:8px 0">
            <input type="checkbox" id="f-show-auto" checked style="width:16px;height:16px;accent-color:var(--accent)"/>
            🔗 অটো এন্ট্রি (অর্ডার/ভাউচার)
          </label>
          <span style="margin-left:auto;font-size:13px;color:var(--ink2)">
            আয়: <strong id="flt-income" style="color:var(--success)">৳0</strong> ·
            ব্যয়: <strong id="flt-expense" style="color:var(--danger)">৳0</strong> ·
            নিট: <strong id="flt-net">৳0</strong>
          </span>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;align-items:start">
        <!-- ENTRIES TABLE -->
        <div class="card" style="padding:0;overflow:hidden">
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>তারিখ</th><th>ধরন</th><th>ক্যাটাগরি</th><th style="text-align:right">পরিমাণ (৳)</th><th>নোট</th><th>অ্যাকশন</th></tr>
              </thead>
              <tbody id="cf-body">
                <tr><td colspan="6"><div class="empty"><div class="empty-icon">💰</div><p>লোড হচ্ছে…</p></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- PER-CATEGORY TOTALS -->
        <div class="card" style="padding:16px">
          <div style="font-size:14px;font-weight:700;color:var(--ink2);margin-bottom:10px">ক্যাটাগরি অনুযায়ী নিট</div>
          <table class="cf-cat-table" id="cat-totals">
            <tbody><tr><td style="color:var(--ink3)">—</td><td></td></tr></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="cf-modal-overlay" id="cf-modal">
  <div style="background:#fff;border-radius:16px;max-width:440px;width:100%;padding:24px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-size:18px;font-weight:700;margin:0" id="cf-modal-title">নতুন এন্ট্রি</h3>
      <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:var(--ink3)">×</button>
    </div>

    <!-- income / expense toggle -->
    <div class="cf-type-toggle">
      <button type="button" id="t-income" onclick="setFlow('income')">📈 আয়</button>
      <button type="button" id="t-expense" onclick="setFlow('expense')">📉 ব্যয়</button>
    </div>

    <div class="field" style="margin-bottom:14px">
      <label>তারিখ *</label>
      <input type="date" id="cf-date"/>
    </div>
    <div class="field" style="margin-bottom:14px">
      <label>ক্যাটাগরি *</label>
      <input type="text" id="cf-category" list="cat-suggestions" placeholder="যেমন: বিক্রয়, পরিবহন, বেতন, ভাড়া"/>
      <datalist id="cat-suggestions"></datalist>
      <p style="font-size:11px;color:var(--ink3);margin-top:3px">আগের ক্যাটাগরি থেকে বেছে নিন বা নতুন লিখুন</p>
    </div>
    <div class="field" style="margin-bottom:14px">
      <label>পরিমাণ (৳) *</label>
      <input type="number" id="cf-amount" min="0" step="0.01" placeholder="0.00"/>
    </div>
    <div class="field" style="margin-bottom:18px">
      <label>নোট</label>
      <input type="text" id="cf-note" placeholder="বিবরণ (ঐচ্ছিক)"/>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal()">বাতিল</button>
      <button class="btn btn-primary" id="cf-save-btn">সেভ করুন</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script src="layout.js"></script>
<script>
buildNav('expenses');
if(Auth.isViewer()){const b=document.getElementById('btn-new');if(b)b.style.display='none';}

let flows = JSON.parse(localStorage.getItem('bf_expenses')||'[]');
let editId = null;
let curFlow = 'expense';

// migrate old rows without a type → treat as expense
flows.forEach(f=>{ if(!f.type) f.type='expense'; });

function saveLocal(){ localStorage.setItem('bf_expenses',JSON.stringify(flows)); }

/* ── DERIVED CASH FLOW ──
   Real cash/bank/mobile movements pulled automatically from orders and
   vouchers (nothing is copied into the Expenses sheet — computed live):
   - sales order cash/bank/mobile received  → আয়
   - purchase order cash/bank/mobile paid   → ব্যয়
   - receipt voucher cash/bank/mobile       → আয়
   - payment voucher cash/bank/mobile       → ব্যয়
   Adjust & dual vouchers move NO cash → excluded. Deduction fields
   (salary/TA/DA/damage/other) are settlements, not cash → excluded. */
function derivedFlows(){
  const out=[];
  const ords=JSON.parse(localStorage.getItem('bf_orders')||'[]');
  ords.forEach(o=>{
    const isSale=o.orderType==='sales';
    [['cash','নগদ'],['bankDeposit','ব্যাংক'],['mobile','মোবাইল']].forEach(([f,lbl])=>{
      const v=parseFloat(o[f]||0);if(v<=0)return;
      out.push({id:'D-'+o.orderId+'-'+f,date:o.date||'',type:isSale?'income':'expense',
        category:isSale?'বিক্রয় আদায়':'ক্রয় পরিশোধ',amount:v,
        note:(isSale?'ইনভয়েস ':'PO ')+(o.orderId||'')+' — '+(o.partyName||'')+' ('+lbl+')',auto:true});
    });
  });
  const vs=JSON.parse(localStorage.getItem('bf_payments')||'[]');
  vs.forEach(v=>{
    // only receipt/payment vouchers move cash — adjust/dual/commission do not
    if(v.vtype!=='receipt'&&v.vtype!=='payment')return;
    [['cash','নগদ'],['bank','ব্যাংক'],['mobile','মোবাইল']].forEach(([f,lbl])=>{
      const a=parseFloat(v[f]||0);if(a<=0)return;
      out.push({id:'D-'+v.id+'-'+f,date:v.date||'',type:v.vtype==='receipt'?'income':'expense',
        category:v.vtype==='receipt'?'রিসিট আদায়':'সরবরাহকারী পেমেন্ট',amount:a,
        note:(v.vno||'')+' — '+(v.partyName||'')+' ('+lbl+')',auto:true});
    });
  });
  return out;
}
function showAuto(){ const el=document.getElementById('f-show-auto'); return !el||el.checked; }
function combined(){ return showAuto()?flows.concat(derivedFlows()):flows.slice(); }

/* categories separated by type */
function categories(type){
  return [...new Set(flows.filter(f=>f.type===type).map(f=>f.category).filter(Boolean))].sort();
}

/* month helpers */
function ym(d){ return (d||'').slice(0,7); }
function thisMonth(){ return new Date().toISOString().slice(0,7); }
function lastMonth(){ const d=new Date(); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,7); }
function sumMonth(m,type){ return combined().filter(f=>ym(f.date)===m&&f.type===type).reduce((s,f)=>s+(parseFloat(f.amount)||0),0); }

function signedNet(v){ return (v>=0?'+':'−')+fmt.currency(Math.abs(v)); }

function updateSummary(){
  const tm=thisMonth(), lm=lastMonth();
  const ti=sumMonth(tm,'income'), te=sumMonth(tm,'expense');
  const li=sumMonth(lm,'income'), le=sumMonth(lm,'expense');
  document.getElementById('s-income').textContent=fmt.currency(ti);
  document.getElementById('s-expense').textContent=fmt.currency(te);
  const net=document.getElementById('s-net');
  net.textContent=signedNet(ti-te);
  net.style.color=(ti-te)>=0?'var(--success)':'var(--danger)';
  document.getElementById('lm-income').textContent=fmt.currency(li);
  document.getElementById('lm-expense').textContent=fmt.currency(le);
  const lnet=document.getElementById('lm-net');
  lnet.textContent=signedNet(li-le);
  lnet.style.color=(li-le)>=0?'var(--success)':'var(--danger)';
}

/* filtering */
function getFiltered(){
  const from=document.getElementById('f-from').value;
  const to=document.getElementById('f-to').value;
  const flow=document.getElementById('f-flow').value;
  const cat=document.getElementById('f-category').value;
  return combined().filter(f=>{
    if(from && (f.date||'')<from) return false;
    if(to && (f.date||'')>to) return false;
    if(flow && f.type!==flow) return false;
    if(cat && f.category!==cat) return false;
    return true;
  }).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
}

function refreshCategoryFilter(){
  const all=[...new Set(combined().map(f=>f.category).filter(Boolean))].sort();
  const fc=document.getElementById('f-category');
  const cur=fc.value;
  fc.innerHTML='<option value="">সব ক্যাটাগরি</option>'+all.map(c=>`<option value="${c}">${c}</option>`).join('');
  fc.value=cur;
}

function render(){
  refreshCategoryFilter();
  const list=getFiltered();
  const tb=document.getElementById('cf-body');
  if(!list.length){
    tb.innerHTML='<tr><td colspan="6"><div class="empty"><div class="empty-icon">💰</div><p>কোনো এন্ট্রি নেই</p></div></td></tr>';
  } else {
    tb.innerHTML=list.map(f=>{
      const inc=f.type==='income';
      const actions=f.auto
        ? '<span style="font-size:11px;color:var(--ink3)" title="অর্ডার/ভাউচার থেকে স্বয়ংক্রিয় — সেখান থেকেই সম্পাদনা করুন">🔗 অটো</span>'
        : `<div class="td-actions">
          <button class="btn btn-outline btn-sm btn-icon" onclick="openModal('${f.id}')" title="সম্পাদনা">✏️</button>
          <button class="btn btn-danger btn-sm btn-icon" onclick="del('${f.id}')" title="মুছুন">🗑️</button>
        </div>`;
      return `<tr>
        <td style="font-size:12px">${fmt.dmy(f.date)}</td>
        <td><span class="cf-type-badge ${inc?'inc':'exp'}">${inc?'আয়':'ব্যয়'}</span></td>
        <td><span class="cf-cat ${inc?'inc':'exp'}">${f.category||'—'}</span></td>
        <td style="text-align:right;font-weight:600;color:${inc?'var(--success)':'var(--danger)'}">${inc?'+':'−'}${fmt.currency(f.amount)}</td>
        <td style="font-size:12px;color:var(--ink2)">${f.note||''}</td>
        <td>${actions}</td>
      </tr>`;
    }).join('');
  }

  const inc=list.filter(f=>f.type==='income').reduce((s,f)=>s+(parseFloat(f.amount)||0),0);
  const exp=list.filter(f=>f.type==='expense').reduce((s,f)=>s+(parseFloat(f.amount)||0),0);
  document.getElementById('flt-income').textContent=fmt.currency(inc);
  document.getElementById('flt-expense').textContent=fmt.currency(exp);
  const fn=document.getElementById('flt-net');
  fn.textContent=signedNet(inc-exp);
  fn.style.color=(inc-exp)>=0?'var(--success)':'var(--danger)';

  const byCat={};
  list.forEach(f=>{ const k=f.category||'—'; if(!byCat[k]) byCat[k]={inc:0,exp:0}; byCat[k][f.type==='income'?'inc':'exp']+=(parseFloat(f.amount)||0); });
  const rows=Object.entries(byCat).sort((a,b)=>(b[1].inc+b[1].exp)-(a[1].inc+a[1].exp));
  const ct=document.querySelector('#cat-totals tbody');
  ct.innerHTML = rows.length
    ? rows.map(([c,v])=>{
        const val=v.inc-v.exp;
        const tag = (v.inc>0&&v.exp===0)?'inc':((v.exp>0&&v.inc===0)?'exp':'');
        return `<tr><td><span class="cf-cat ${tag}">${c}</span></td>
          <td style="color:${val>=0?'var(--success)':'var(--danger)'}">${signedNet(val)}</td></tr>`;
      }).join('')
      + `<tr style="border-top:2px solid var(--border)"><td style="font-weight:700">নিট</td>
         <td style="font-weight:700;color:${(inc-exp)>=0?'var(--success)':'var(--danger)'}">${signedNet(inc-exp)}</td></tr>`
    : '<tr><td style="color:var(--ink3)">—</td><td></td></tr>';

  updateSummary();
}

/* modal */
function setFlow(type){
  curFlow=type;
  document.getElementById('t-income').className = type==='income'?'sel-inc':'';
  document.getElementById('t-expense').className = type==='expense'?'sel-exp':'';
  document.getElementById('cat-suggestions').innerHTML=categories(type).map(c=>`<option value="${c}">`).join('');
}
function openModal(id=null){
  editId=id;
  const f=id?flows.find(x=>x.id===id):null;
  document.getElementById('cf-modal-title').textContent=f?'এন্ট্রি সম্পাদনা':'নতুন এন্ট্রি';
  setFlow(f?.type||'expense');
  document.getElementById('cf-date').value=f?.date||fmt.dateInput();
  document.getElementById('cf-category').value=f?.category||'';
  document.getElementById('cf-amount').value=f?.amount||'';
  document.getElementById('cf-note').value=f?.note||'';
  document.getElementById('cf-modal').classList.add('open');
  setTimeout(()=>document.getElementById('cf-category').focus(),100);
}
function closeModal(){ document.getElementById('cf-modal').classList.remove('open'); }

async function save(){
  if(Auth.guardWrite())return;
  const date=document.getElementById('cf-date').value;
  const category=document.getElementById('cf-category').value.trim();
  const amount=parseFloat(document.getElementById('cf-amount').value);
  const note=document.getElementById('cf-note').value.trim();
  if(!date){ toast('তারিখ দিন','error'); return; }
  if(!category){ toast('ক্যাটাগরি লিখুন','error'); return; }
  if(!amount||amount<=0){ toast('সঠিক পরিমাণ দিন','error'); return; }

  const rec={ id: editId||('CF'+Date.now()), date, type:curFlow, category, amount, note, savedAt:new Date().toISOString() };
  const idx=flows.findIndex(x=>x.id===rec.id);
  if(idx>-1) flows[idx]=rec; else flows.unshift(rec);
  saveLocal(); render(); closeModal();
  toast(editId?'এন্ট্রি আপডেট হয়েছে ✓':'এন্ট্রি সেভ হয়েছে ✓','success');
  if(BF.sheetUrl){ try{ await API.post({action:'saveExpense',...rec}); }catch(e){ toast('Sheet সিঙ্ক ব্যর্থ — স্থানীয়ভাবে সেভ হয়েছে','error'); } }
}

function del(id){
  if(Auth.guardWrite())return;
  if((BF.session&&BF.session.role==='admin')&&(localStorage.getItem('bf_del_cashflow')==='off')){
    toast('অ্যাডমিনের ডিলিট অনুমতি বন্ধ আছে — Super User এর সাথে যোগাযোগ করুন','error'); return;
  }
  const f=flows.find(x=>x.id===id); if(!f) return;
  bfConfirm(`${f.type==='income'?'আয়':'ব্যয়'} — "${f.category}" ${fmt.currency(f.amount)} মুছে দেবেন?`, async ()=>{
    flows=flows.filter(x=>x.id!==id);
    saveLocal(); render();
    toast('এন্ট্রি মুছে ফেলা হয়েছে','success');
    if(BF.sheetUrl) API.post({action:'deleteExpense',id}).catch(()=>{});
  });
}

function exportCsv(){
  const list=getFiltered();
  if(!list.length){ toast('কোনো ডেটা নেই','error'); return; }
  const h=['তারিখ','ধরন','ক্যাটাগরি','পরিমাণ','নোট'];
  const rows=list.map(f=>[f.date,(f.type==='income'?'আয়':'ব্যয়'),f.category,f.amount,f.note].map(v=>`"${v||''}"`).join(','));
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent('\uFEFF'+[h.join(','),...rows].join('\n'));
  a.download='cashflow_'+fmt.dateInput()+'.csv'; a.click();
}

/* events */
document.getElementById('btn-new').addEventListener('click',()=>openModal());
document.getElementById('cf-save-btn').addEventListener('click',save);
document.getElementById('btn-export').addEventListener('click',exportCsv);
document.getElementById('f-from').addEventListener('change',render);
document.getElementById('f-to').addEventListener('change',render);
document.getElementById('f-flow').addEventListener('change',render);
document.getElementById('f-category').addEventListener('change',render);
document.getElementById('f-show-auto').addEventListener('change',render);
document.getElementById('btn-clear').addEventListener('click',()=>{
  document.getElementById('f-from').value='';
  document.getElementById('f-to').value='';
  document.getElementById('f-flow').value='';
  document.getElementById('f-category').value='';
  render();
});
document.getElementById('cf-modal').addEventListener('click',e=>{ if(e.target.id==='cf-modal') closeModal(); });

/* load */
async function load(){
  if(BF.sheetUrl){
    try{
      const d=await API.fetch('getExpenses');
      if(Array.isArray(d)){ d.forEach(x=>{ if(!x.type) x.type='expense'; }); flows=d; saveLocal(); }
    }catch(e){}
  }
  render();
}
load();
</script>
