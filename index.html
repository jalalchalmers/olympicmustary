<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>hFlow — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--ink:#0f172a;--ink2:#475569;--accent:#4f46e5;--accent2:#7c3aed;--border:#e2e8f0;--bg:#f8fafc}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;overflow:hidden}
    body::before{content:'';position:absolute;top:-120px;right:-120px;width:480px;height:480px;background:radial-gradient(circle,rgba(79,70,229,.12) 0%,transparent 70%);pointer-events:none}
    body::after{content:'';position:absolute;bottom:-80px;left:-80px;width:360px;height:360px;background:radial-gradient(circle,rgba(124,58,237,.1) 0%,transparent 70%);pointer-events:none}
    .wrap{width:100%;max-width:420px;background:#fff;border-radius:24px;box-shadow:0 4px 40px rgba(79,70,229,.12),0 1px 3px rgba(0,0,0,.06);padding:44px 40px 40px;position:relative;z-index:1}
    .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:32px}
    .logo-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center}
    .logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--ink)}
    .logo-text span{color:var(--accent)}
    h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;margin-bottom:6px}
    .sub{font-size:14px;color:var(--ink2);margin-bottom:28px}
    .field{margin-bottom:18px}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
    .field input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:15px;color:var(--ink);background:var(--bg);outline:none;transition:border-color .2s,box-shadow .2s}
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.1);background:#fff}
    .btn-login{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px}
    .btn-login:hover{opacity:.92}
    .btn-login:active{transform:scale(.98)}
    .btn-login:disabled{opacity:.65;cursor:not-allowed;transform:none}
    .err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
    .sync-log{margin-top:16px;background:var(--bg);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--ink2);min-height:20px;display:none;line-height:1.8}
    .hint{font-size:12px;color:var(--ink2);text-align:center;margin-top:20px;line-height:1.7}
    .hint strong{color:var(--accent)}
    .version{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:11px;color:#94a3b8;white-space:nowrap}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <div class="logo-icon"><svg width="44" height="44" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="hfg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs><rect width="48" height="48" rx="13" fill="url(#hfg1)"/><path d="M15 11 V34 M15 23 C15 17 29 17 29 23 V30 C29 35 36 35 38 30" stroke="#fff" stroke-width="4.6" stroke-linecap="round" fill="none"/><path d="M11 40 C18 44 26 36 37 40" stroke="#a5b4fc" stroke-width="3" stroke-linecap="round" fill="none" opacity=".9"/></svg></div>
    <div class="logo-text">h<span>Flow</span></div>
  </div>
  <h1>স্বাগতম</h1>
  <p class="sub">Business Management System</p>

  <div class="err" id="err"></div>

  <div class="field">
    <label>পাসওয়ার্ড</label>
    <input type="password" id="pw" placeholder="Enter your password" autocomplete="current-password"/>
  </div>
  <button class="btn-login" id="btn">প্রবেশ করুন →</button>

  <div class="sync-log" id="sync-log"></div>

  <div class="hint">
    <!-- Default Super → <strong>super123</strong> &nbsp;|&nbsp; Admin → <strong>admin123</strong><br/>
    Settings থেকে পাসওয়ার্ড পরিবর্তন করুন -->
    Query @ <strong>01911243431</strong>
  </div>
</div>
<div class="version">hFlow v1.2 · Google Sheets powered</div>

<script>
/* ════ CONFIG ════ */
// Hardcoded Web App URL so any new browser connects automatically
var DEFAULT_SHEET_URL = 'https://script.google.com/macros/s/AKfycbxsEntAKVTsaWOA6QBhpUdsCx5r5cSCSbRPKbrNk3PV0umv94efsKTEJH5Z3iToj71hOQ/exec';
if (!localStorage.getItem('bf_sheet_url')) {
  localStorage.setItem('bf_sheet_url', DEFAULT_SHEET_URL);
}
function sheetUrl(){ return localStorage.getItem('bf_sheet_url') || DEFAULT_SHEET_URL; }

/* ════ Already logged in? go to dashboard (guard against loop) ════ */
(function(){
  try {
    var s = JSON.parse(sessionStorage.getItem('bf_session') || 'null');
    if (s && s.role) { window.location.replace('dashboard.html'); }
  } catch(e) {}
})();

/* ════ JSONP fetch (CORS-free) ════ */
function jsonpFetch(action, extra) {
  return new Promise(function(resolve, reject){
    var url = sheetUrl();
    if (!url) { reject(new Error('No URL')); return; }
    var cb = '_bfcb_' + Date.now() + Math.floor(Math.random()*9999);
    var timer = setTimeout(function(){ cleanup(); reject(new Error('Timeout')); }, 12000);
    function cleanup(){ clearTimeout(timer); delete window[cb]; var el=document.getElementById(cb); if(el) el.remove(); }
    window[cb] = function(d){ cleanup(); resolve(d); };
    var u = new URL(url);
    u.searchParams.set('action', action);
    u.searchParams.set('callback', cb);
    if (extra) { for (var k in extra) u.searchParams.set(k, extra[k]); }
    var s = document.createElement('script');
    s.id = cb; s.src = u.toString();
    s.onerror = function(){ cleanup(); reject(new Error('load fail')); };
    document.head.appendChild(s);
  });
}

/* ════ Sync data after login ════ */
function syncData(logEl) {
  var steps = [
    { action:'getConfig',   label:'কনফিগ',       store:null },
    { action:'getParties',  label:'পার্টি',        store:'bf_parties' },
    { action:'getProducts', label:'পণ্য',          store:'bf_products' },
    { action:'getOrders',   label:'অর্ডার',         store:'bf_orders' },
    { action:'getPayments', label:'পেমেন্ট',        store:'bf_payments' }
  ];
  var chain = Promise.resolve();
  steps.forEach(function(step){
    chain = chain.then(function(){
      logEl.style.display='block';
      logEl.innerHTML += '⟳ ' + step.label + ' লোড হচ্ছে…<br>';
      return jsonpFetch(step.action).then(function(data){
        if (step.action==='getConfig' && data && !data.error) {
          if (data.pw_super)   { localStorage.setItem('bf_pw_super', data.pw_super); }
          if (data.pw_admin)   { localStorage.setItem('bf_pw_admin', data.pw_admin); }
          if (data.pw_viewer)  { localStorage.setItem('bf_pw_viewer', data.pw_viewer); }
          if (data.biz_name)   localStorage.setItem('bf_biz_name', data.biz_name);
          if (data.biz_phone)  localStorage.setItem('bf_biz_phone', data.biz_phone);
          if (data.biz_address)localStorage.setItem('bf_biz_address', data.biz_address);
          if (data.depo_text)  localStorage.setItem('bf_depo_text',   data.depo_text);
          // admin permissions (default 'on')
          localStorage.setItem('bf_del_sales',     data.del_sales     || 'on');
          localStorage.setItem('bf_del_purchases', data.del_purchases || 'on');
          localStorage.setItem('bf_del_products',  data.del_products  || 'on');
          localStorage.setItem('bf_del_parties',   data.del_parties   || 'on');
          localStorage.setItem('bf_del_payments',  data.del_payments  || 'on');
          localStorage.setItem('bf_del_cashflow',  data.del_cashflow  || 'on');
          localStorage.setItem('bf_edit_orders',   data.edit_orders   || 'on');
          localStorage.setItem('bf_perm_pricelist',data.perm_pricelist|| 'on');
          localStorage.setItem('bf_perm_pushprice',data.perm_pushprice|| 'off');
          localStorage.setItem('bf_perm_rateupdate',data.perm_rateupdate|| 'off');
        } else if (step.store && Array.isArray(data)) {
          if (step.action==='getProducts') {
            localStorage.setItem(step.store, JSON.stringify(
              data.map(function(p){ p.hasOffer = (p.hasOffer==='true'||p.hasOffer===true); return p; })
            ));
          } else if (step.store==='bf_orders') {
            // merge — never erase local unsynced orders (helper duplicated here
            // because index.html does not load shared.js)
            var local=[]; try{ local=JSON.parse(localStorage.getItem('bf_orders')||'[]'); }catch(e){}
            var ids={}; data.forEach(function(o){ ids[String(o.orderId)]=1; });
            var keep=local.filter(function(o){ return (o._sync==='sent'||o._sync==='local') && !ids[String(o.orderId)]; });
            localStorage.setItem('bf_orders', JSON.stringify(keep.concat(data)));
          } else {
            localStorage.setItem(step.store, JSON.stringify(data));
          }
        }
        logEl.innerHTML = logEl.innerHTML.replace('⟳ '+step.label+' লোড হচ্ছে…<br>', '✓ '+step.label+' লোড হয়েছে<br>');
      }).catch(function(){
        logEl.innerHTML = logEl.innerHTML.replace('⟳ '+step.label+' লোড হচ্ছে…<br>', '⚠ '+step.label+' ব্যর্থ<br>');
      });
    });
  });
  return chain.then(function(){ localStorage.setItem('bf_last_sync', new Date().toISOString()); });
}

/* ════ LOGIN ════ */
var btn   = document.getElementById('btn');
var errEl = document.getElementById('err');
var pwEl  = document.getElementById('pw');
var logEl = document.getElementById('sync-log');

function doLogin() {
  var pw = pwEl.value.trim();
  errEl.style.display = 'none';
  logEl.style.display = 'none';
  logEl.innerHTML = '';

  if (!pw) { errEl.textContent='পাসওয়ার্ড লিখুন।'; errEl.style.display='block'; return; }

  btn.innerHTML = '<span class="spin"></span> যাচাই হচ্ছে…';
  btn.disabled = true;

  // Pull latest passwords from Sheet first
  jsonpFetch('getConfig').then(function(config){
    if (config && !config.error) {
      if (config.pw_super)  localStorage.setItem('bf_pw_super', config.pw_super);
      if (config.pw_admin)  localStorage.setItem('bf_pw_admin', config.pw_admin);
      if (config.pw_viewer) localStorage.setItem('bf_pw_viewer', config.pw_viewer);
      localStorage.setItem('bf_del_sales',     config.del_sales     || 'on');
      localStorage.setItem('bf_del_purchases', config.del_purchases || 'on');
      localStorage.setItem('bf_del_products',  config.del_products  || 'on');
      localStorage.setItem('bf_del_parties',   config.del_parties   || 'on');
      localStorage.setItem('bf_del_payments',  config.del_payments  || 'on');
      localStorage.setItem('bf_del_cashflow',  config.del_cashflow  || 'on');
      localStorage.setItem('bf_edit_orders',   config.edit_orders   || 'on');
      localStorage.setItem('bf_perm_pricelist',config.perm_pricelist|| 'on');
      localStorage.setItem('bf_perm_pushprice',config.perm_pushprice|| 'off');
      localStorage.setItem('bf_perm_rateupdate',config.perm_rateupdate|| 'off');
    }
  }).catch(function(){}).then(function(){
    finishLogin(pw);
  });
}

function finishLogin(pw) {
  var superPw  = localStorage.getItem('bf_pw_super')  || 'super123';
  var adminPw  = localStorage.getItem('bf_pw_admin')  || 'admin123';
  var viewerPw = localStorage.getItem('bf_pw_viewer') || 'view123';

  var role = null;
  if (pw === superPw)       role = 'super';
  else if (pw === adminPw)  role = 'admin';
  else if (pw === viewerPw) role = 'viewer';

  if (!role) {
    errEl.textContent = 'পাসওয়ার্ড সঠিক নয়। আবার চেষ্টা করুন।';
    errEl.style.display = 'block';
    btn.innerHTML = 'প্রবেশ করুন →';
    btn.disabled = false;
    pwEl.value = ''; pwEl.focus();
    return;
  }

  sessionStorage.setItem('bf_session', JSON.stringify({ role: role, loginTime: Date.now() }));

  btn.innerHTML = '<span class="spin"></span> ডেটা লোড হচ্ছে…';
  syncData(logEl).then(function(){
    var redirect = new URLSearchParams(window.location.search).get('redirect');
    var target = 'dashboard.html';
    if (redirect && /^[a-z0-9_-]+$/i.test(redirect)) {
      target = redirect.indexOf('.html') > -1 ? redirect : (redirect + '.html');
    }
    window.location.replace(target);
  });
}

btn.addEventListener('click', doLogin);
pwEl.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.keyCode===13) doLogin(); });
</script>
</body>
</html>
